<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kitchen Dashboard — Mama's Kitchen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Inter', sans-serif; }
        .brand-font { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-stone-100 text-stone-900 min-h-screen">
    <header class="bg-stone-900 text-white">
        <div class="max-w-7xl mx-auto px-6 py-6 flex items-center justify-between">
            <div>
                <p class="text-stone-400 text-xs uppercase tracking-widest">Admin</p>
                <h1 class="brand-font text-3xl font-black">Kitchen Dashboard</h1>
            </div>
            <div class="flex items-center gap-4">
                <span id="last-refresh" class="text-xs text-stone-400"></span>
                <button id="refresh-btn" class="bg-stone-700 hover:bg-stone-600 px-4 py-2 rounded-lg text-sm font-semibold">Refresh</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <div id="auth-warning" class="hidden bg-rose-100 border border-rose-300 text-rose-900 p-4 rounded-lg mb-6">
            <p class="font-semibold">Missing admin key.</p>
            <p class="text-sm mt-1">Open this page as <code class="bg-rose-200 px-1 rounded">admin.html?key=YOUR_ADMIN_SECRET</code>.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white rounded-lg p-4 shadow-sm border-l-4 border-amber-500">
                <p class="text-xs text-stone-500 uppercase">Received</p>
                <p id="count-received" class="text-3xl font-bold">—</p>
            </div>
            <div class="bg-white rounded-lg p-4 shadow-sm border-l-4 border-orange-500">
                <p class="text-xs text-stone-500 uppercase">Preparing</p>
                <p id="count-preparing" class="text-3xl font-bold">—</p>
            </div>
            <div class="bg-white rounded-lg p-4 shadow-sm border-l-4 border-sky-500">
                <p class="text-xs text-stone-500 uppercase">On the way</p>
                <p id="count-out_for_delivery" class="text-3xl font-bold">—</p>
            </div>
            <div class="bg-white rounded-lg p-4 shadow-sm border-l-4 border-emerald-500">
                <p class="text-xs text-stone-500 uppercase">Delivered today</p>
                <p id="count-delivered" class="text-3xl font-bold">—</p>
            </div>
        </div>

        <h2 class="brand-font text-2xl font-bold mb-4">Active orders</h2>
        <div id="orders-list" class="space-y-4">
            <p id="empty-state" class="text-stone-500 text-center py-12">Loading...</p>
        </div>
    </main>

    <script src="/app.js"></script>
    <script src="/admin.js"></script>
</body>
</html>
